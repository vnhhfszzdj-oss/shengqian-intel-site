<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章页 | 抠门精小晨</title>
    <meta name="description" content="抠门精小晨文章页模板" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html">
          <span class="brand-mark">晨</span>
          <span>
            <strong>抠门精小晨</strong>
            <small>会过日子的生活省钱指南</small>
          </span>
        </a>
        <nav class="site-nav" aria-label="主导航" id="nav-links"></nav>
      </header>

      <main>
        <section class="hero page-hero compact-hero article-hero">
          <div class="hero-copy">
            <p class="eyebrow" id="article-tag"></p>
            <h1 id="article-title"></h1>
            <p class="hero-text" id="article-summary"></p>
            <div class="hero-actions">
              <a class="button button-primary" id="back-category-link" href="index.html">返回栏目</a>
              <a class="button button-secondary" href="index.html">返回首页</a>
            </div>
          </div>
          <aside class="hero-card article-meta-card">
            <p class="card-kicker">阅读提示</p>
            <div class="article-meta-grid">
              <div>
                <small>阅读时长</small>
                <strong id="article-readtime"></strong>
              </div>
              <div>
                <small>预算参考</small>
                <strong id="article-budget"></strong>
              </div>
            </div>
            <p class="article-audience" id="article-audience"></p>
          </aside>
        </section>

        <section class="section article-layout">
          <article class="article-body" id="article-body"></article>
          <aside class="article-side">
            <div class="checklist-card">
              <p class="card-kicker">这篇会讲什么</p>
              <ul id="article-checklist"></ul>
            </div>
          </aside>
        </section>

        <section class="section">
          <div class="section-heading">
            <p class="eyebrow">相关文章</p>
            <h2>继续往下看</h2>
          </div>
          <div class="feature-list" id="related-articles"></div>
        </section>
      </main>

      <footer class="site-footer">
        <p>文章页 · 已支持更完整正文、要点和相关文章</p>
        <p>后续可继续补目录、发布时间和作者信息</p>
      </footer>
    </div>

    <script src="data.js"></script>
    <script src="page-article.js"></script>
  </body>
</html>
